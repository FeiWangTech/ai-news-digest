name: Send Daily AI Digest

on:
  schedule:
    # 7:00 PM America/Chicago across daylight-saving changes.
    - cron: "0 0 * * *"
    - cron: "0 1 * * *"
  workflow_dispatch:

concurrency:
  group: daily-ai-digest
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  send-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check local delivery time
        if: github.event_name == 'schedule'
        run: |
          if [ "$(TZ=America/Chicago date +%H)" != "19" ]; then
            echo "Skipping this UTC schedule because it is not 7 PM in America/Chicago."
            echo "SKIP_DIGEST=true" >> "$GITHUB_ENV"
          fi

      - name: Check out repository
        if: env.SKIP_DIGEST != 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: env.SKIP_DIGEST != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        if: env.SKIP_DIGEST != 'true'
        run: python -m pip install -r requirements.txt

      - name: Send digest
        if: env.SKIP_DIGEST != 'true'
        env:
          GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PW: ${{ secrets.GMAIL_APP_PW }}
          DIGEST_RECIPIENT: ${{ secrets.DIGEST_RECIPIENT }}
        run: |
          python -m backend.app.cli \
            --recipient "$DIGEST_RECIPIENT"
